<style>
/* 전체화면 오버레이 — 코너 요소(z-index:10) 아래 */
.r-wrap {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 8;
  background: #111827;
  display: flex;
  flex-direction: row;
  direction: rtl;
}

/* 컬럼 */
.r-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  border-right: 1px solid rgba(120, 90, 210, 0.35);
  gap: 0;
  padding-bottom: 4vh;
}
.r-col:last-child { border-right: none; }

/* 아랍어 글자 */
.r-letter {
  font-family: 'Noto Sans Arabic', serif;
  font-size: min(14vw, 11rem);
  font-weight: 700;
  color: #ffffff;
  line-height: 1;
  display: block;
}

/* 발음 */
.r-label {
  font-size: clamp(0.85rem, 1.6vw, 1.35rem);
  color: #8E95A0;
  letter-spacing: 0.04em;
  margin-top: clamp(1rem, 3vh, 2rem);
  font-family: 'Spoqa Han Sans Neo', sans-serif;
  display: block;
}

/* 청록 기준선 — 글자 베이스라인 위치에 */
.r-line {
  position: fixed;
  left: 0; right: 0;
  height: 2px;
  background: #16988d;
  box-shadow: 0 0 12px rgba(22,152,141,0.5);
  z-index: 9;
  pointer-events: none;
  top: calc(50% - 1vh);  /* 시각적 기준선 위치 */
}
</style>

<!-- 기준선 -->
<div class="r-line"></div>

<!-- 5컬럼 — RTL이므로 ي ن ث ت ب 순서로 -->
<div class="r-wrap">
  <div class="r-col">
    <span class="r-letter">ي</span>
    <span class="r-label">ya</span>
  </div>
  <div class="r-col">
    <span class="r-letter">ن</span>
    <span class="r-label">nun</span>
  </div>
  <div class="r-col">
    <span class="r-letter">ث</span>
    <span class="r-label">th[θ]a</span>
  </div>
  <div class="r-col">
    <span class="r-letter">ت</span>
    <span class="r-label">ta</span>
  </div>
  <div class="r-col">
    <span class="r-letter">ب</span>
    <span class="r-label">ba</span>
  </div>
</div>
