<style>
/*
  오버레이(#custom-overlay)가 position:fixed 100vw×100vh이므로
  .r-wrap은 width/height 100%로 꽉 채우면 됨.
  direction:rtl + flex-direction:row → HTML 첫 항목이 오른쪽에 배치됨.
  따라서 HTML 순서: ب(ba) ت(ta) ث(tha) ن(nun) ي(ya)
  → 화면에 오른쪽부터: ب ت ث ن ي (아랍어 어순 정방향)
*/

.r-wrap {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: row;
  direction: rtl;
  position: relative;
  overflow: hidden;
}

.r-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-right: 1px solid rgba(120, 90, 210, 0.35);
}
.r-col:last-child { border-right: none; }

/* 아랍어 글자 */
.r-letter {
  font-family: 'Noto Sans Arabic', serif;
  font-size: min(14vw, 11rem);
  font-weight: 700;
  color: #ffffff;
  line-height: 1;
  display: block;
  /* 글자를 기준선 위로 올리기 위해 살짝 위로 이동 */
  transform: translateY(-1.5vh);
}

/* 발음 레이블 */
.r-label {
  font-size: clamp(0.85rem, 1.6vw, 1.35rem);
  color: #8E95A0;
  letter-spacing: 0.04em;
  margin-top: clamp(0.4rem, 1.2vh, 1rem);
  font-family: 'Spoqa Han Sans Neo', sans-serif;
  display: block;
  transform: translateY(-1.5vh);
}

/* 기준선 — JS로 위치 결정 */
.r-line {
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: #16988d;
  box-shadow: 0 0 14px rgba(22,152,141,0.55);
  pointer-events: none;
  top: 50%; /* JS 실행 전 임시값 */
  transform: translateY(-1.5vh);
}
</style>

<div class="r-wrap" id="r-wrap-root">
  <div class="r-line" id="r-baseline"></div>

  <!-- RTL flex: 첫 번째 div가 화면 오른쪽 → ب 오른쪽에 배치됨 -->
  <div class="r-col">
    <span class="r-letter">ب</span>
    <span class="r-label">ba</span>
  </div>
  <div class="r-col">
    <span class="r-letter">ت</span>
    <span class="r-label">ta</span>
  </div>
  <div class="r-col">
    <span class="r-letter">ث</span>
    <span class="r-label">th[θ]a</span>
  </div>
  <div class="r-col">
    <span class="r-letter">ن</span>
    <span class="r-label">nun</span>
  </div>
  <div class="r-col">
    <span class="r-letter">ي</span>
    <span class="r-label">ya</span>
  </div>
</div>

<script>
(function() {
  // 아랍어 글자의 실제 baseline 위치 계산:
  // getBoundingClientRect()로 글자 위치를 측정 후
  // Noto Sans Arabic 기준: 글자 높이의 약 72%가 baseline 위 (ascender 비율)
  // → baseline Y = rect.top + rect.height * 0.72
  function positionBaseline() {
    var letter = document.querySelector('#r-wrap-root .r-letter');
    var line = document.getElementById('r-baseline');
    var wrap = document.getElementById('r-wrap-root');
    if (!letter || !line || !wrap) return;

    var letterRect = letter.getBoundingClientRect();
    var wrapRect   = wrap.getBoundingClientRect();

    // overlay 내 상대 좌표로 변환
    var baselineY = (letterRect.top - wrapRect.top) + letterRect.height * 0.72;

    line.style.top = baselineY + 'px';
    line.style.transform = 'none'; // CSS transform 제거
  }

  // 폰트 로드 후 실행 (정확한 측정을 위해)
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(function() {
      requestAnimationFrame(positionBaseline);
    });
  }
  // 폰트 대기 없이도 한 번 실행 (폰트 이미 캐시된 경우)
  requestAnimationFrame(positionBaseline);
})();
</script>
