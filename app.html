<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>올댓아라빅</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/spoqa/spoqa-han-sans@latest/css/SpoqaHanSansNeo.css" rel="stylesheet">
<style>
/* ── 리셋 & 변수 ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #111827;
  --accent: #16988d;
  --text:   #ffffff;
  --sub:    #8E95A0;
  --border: #1e293b;
}
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Spoqa Han Sans Neo', 'Apple SD Gothic Neo', sans-serif;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* ── 4 코너 ── */
#ui-tl, #ui-bl, #ui-br { position: fixed; z-index: 10; }
#ui-tl {
  top: clamp(1rem,3vw,2rem); left: clamp(1rem,3vw,3rem);
  font-size: clamp(0.8rem,1.8vw,1.3rem);
  font-weight: bold; color: var(--text);
  line-height: 1.5; max-width: 50vw;
}
#ui-tr {
  font-size: clamp(0.55rem,0.85vw,0.75rem);
  text-transform: uppercase;
  letter-spacing: 2.5px;
  color: var(--sub);
  opacity: 0.65;
  white-space: nowrap;
  margin-bottom: 0.5rem;
}
#ui-bl {
  bottom: clamp(1rem,3vw,2rem); left: clamp(1rem,3vw,3rem);
  font-size: clamp(0.65rem,1.2vw,1rem);
  color: var(--sub);
}
#ui-br {
  bottom: clamp(1rem,3vw,2rem); right: clamp(1rem,3vw,3rem);
  font-size: clamp(0.8rem,1.8vw,1.4rem);
  font-weight: bold; color: var(--text);
  text-align: right; line-height: 1.2;
}

/* ── 커스텀 오버레이 ── */
#custom-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 5;
  background: var(--bg);
}
#custom-overlay.active { display: block; }

/* ── 진행바 ── */
#progress {
  position: fixed; top: 0; left: 0;
  height: 3px; background: var(--accent);
  transition: width 0.3s; z-index: 50;
}

/* ── 메인 콘텐츠 ── */
#main {
  text-align: center;
  width: min(92vw, 1400px);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(1rem, 3vh, 2.5rem);
  padding: clamp(60px,10vh,100px) 20px clamp(80px,12vh,120px);
}

/* ── 아랍어 ── */
.arabic {
  font-family: 'Noto Sans Arabic', serif;
  font-size: clamp(3rem, 9vw, 9rem);
  font-weight: 700;
  direction: rtl;
  line-height: 1.6;
  text-align: center;
}

/* ── 한국어/노트 ── */
.korean {
  display: block;
  font-size: clamp(1.2rem, 3.5vw, 3.5rem);
  transition: opacity 0.3s;
  line-height: 1.4;
}
.note {
  display: block;
  font-size: clamp(0.9rem, 2.2vw, 2.2rem);
  color: var(--sub);
  transition: opacity 0.3s;
  line-height: 1.4;
  margin-top: 0.4em;
}
.meaning-hidden .korean,
.meaning-hidden .note { opacity: 0; pointer-events: none; }
#text-area { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; min-height: 2rem; }

/* ── 하이라이트 ── */
.highlight-box {
  border: 3px solid var(--accent);
  background: rgba(22,152,141,0.12);
  border-radius: 14px;
  padding: 0.05em 0.5em 0.1em;
  margin: 0 0.15em;
  display: inline;
  -webkit-box-decoration-break: clone;
  box-decoration-break: clone;
}
.highlight-text { color: var(--accent); font-weight: bold; }

/* ── 나스 슬라이드 ── */
.nass-prompt {
  display: flex; flex-direction: column;
  align-items: center; gap: 1rem;
}
.nass-id {
  font-size: clamp(0.9rem, 2vw, 1.8rem);
  color: var(--sub); letter-spacing: 3px;
}
.nass-sual {
  font-family: 'Noto Sans Arabic', serif;
  font-size: clamp(2rem, 5vw, 4.5rem);
  font-weight: bold; color: var(--accent);
  direction: rtl;
}
.nass-arabic-wrap {
  max-height: 55vh; overflow-y: auto;
  width: 100%; padding: 0 clamp(1rem,5vw,4rem);
}
.nass-arabic-wrap .arabic {
  font-size: clamp(1.6rem, 4.5vw, 5.5rem);
  text-align: right; line-height: 2;
}

/* ── 사이드바 ── */
#sidebar {
  position: fixed; top: 0; left: 0;
  width: min(440px, 92vw); height: 100%;
  background: rgba(9,13,20,0.97);
  border-right: 2px solid var(--accent);
  transform: translateX(-100%);
  transition: transform 0.3s ease;
  z-index: 200;
  display: flex; flex-direction: column;
  box-shadow: 5px 0 30px rgba(0,0,0,0.6);
}
#sidebar.open { transform: translateX(0); }
.sb-head {
  padding: 1.5rem 2rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sb-head h2 { color: var(--accent); font-size: clamp(1.1rem,2.5vw,1.6rem); margin-bottom: 1rem; }
.key-list { list-style: none; font-size: clamp(0.8rem,1.8vw,1.15rem); color: #ccc; line-height: 2.1; }
.key { display: inline-block; background: #2a2a2a; border: 1px solid #444; padding: 1px 8px; border-radius: 4px; font-weight: bold; color: #fff; margin-right: 6px; font-size: 0.88em; }
.sb-units {
  padding: 0.8rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex; gap: 0.5rem; flex-wrap: wrap; flex-shrink: 0;
}
.unit-btn {
  padding: 5px 16px; border-radius: 20px;
  border: 1px solid #334155; background: transparent;
  color: var(--sub); cursor: pointer;
  font-size: clamp(0.75rem,1.5vw,1rem);
  font-family: inherit; transition: all 0.15s;
}
.unit-btn.active, .unit-btn:hover {
  background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold;
}
#index-list {
  list-style: none; overflow-y: auto; flex: 1; padding: 0.4rem 0;
}
.idx-item {
  padding: 0.65rem 1.8rem;
  font-size: clamp(0.75rem,1.6vw,1.1rem);
  color: var(--sub); cursor: pointer;
  border-left: 4px solid transparent;
  transition: all 0.15s;
  display: flex; gap: 0.7rem; align-items: baseline;
}
.idx-item:hover { background: rgba(22,152,141,0.08); color: #fff; }
.idx-item.active { background: rgba(22,152,141,0.18); color: #fff; border-left-color: var(--accent); }
.idx-tag {
  font-size: 0.72em; color: var(--accent);
  background: rgba(22,152,141,0.12);
  padding: 1px 7px; border-radius: 4px;
  flex-shrink: 0; text-transform: uppercase;
}
.idx-ar { font-family: 'Noto Sans Arabic', serif; direction: rtl; }

/* ── 하단 단축키 바 ── */
#toolbar {
  position: fixed;
  bottom: clamp(0.8rem,2vw,1.5rem);
  left: 50%; transform: translateX(-50%);
  display: flex; gap: clamp(0.8rem,2vw,1.8rem);
  z-index: 30; align-items: center;
}
.tb-btn {
  background: transparent; border: none;
  color: var(--sub); cursor: pointer;
  font-size: clamp(0.6rem,0.9vw,0.78rem);
  font-family: inherit;
  display: flex; align-items: center; gap: 4px;
  opacity: 0.6; transition: opacity 0.15s;
  padding: 0;
  white-space: nowrap;
}
.tb-btn:hover { opacity: 1; color: var(--text); }
.tb-btn.active { opacity: 1; color: var(--accent); }
.tb-btn .kb { display: inline-block; background: #2a2a2a; border: 1px solid #444; border-radius: 3px; padding: 0px 5px; font-size: 0.9em; color: #ccc; }
#btn-nass { display: none; }

/* ── 로딩 ── */
#loading {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(1rem,2.5vw,1.5rem);
  color: var(--accent); z-index: 999;
}
</style>
</head>
<body>

<div id="loading">데이터 로딩 중...</div>
<div id="progress"></div>

<!-- 코너 -->
<div id="ui-tl">Unit 1</div>
<div id="ui-bl">© Markaz Arabic</div>
<div id="ui-br">ALL THAT<br>ARABIC</div>

<!-- 사이드바 -->
<div id="sidebar">
  <div class="sb-head">
    <h2>☰ 메뉴</h2>
    <ul class="key-list">
      <li><span class="key">M</span> 메뉴 열기/닫기</li>
      <li><span class="key">Space</span> 해석 보기/가리기</li>
      <li><span class="key">T</span> 지문 보기/가리기 (나스)</li>
      <li><span class="key">S</span> 오디오 재생/정지</li>
      <li><span class="key">←  →</span> 이전 / 다음</li>
    </ul>
  </div>
  <div class="sb-units" id="sb-chapters" style="border-bottom:none; padding-bottom:0.2rem;">
    <span style="font-size:0.7rem;color:var(--sub);width:100%;display:block;margin-bottom:4px;">챕터</span>
  </div>
  <div class="sb-units" id="sb-units">
    <span style="font-size:0.7rem;color:var(--sub);width:100%;display:block;margin-bottom:4px;">유닛</span>
  </div>
  <ul id="index-list"></ul>
</div>

<!-- 메인 -->
<div id="main">
  <div id="ui-tr">PATTERN</div>
  <div id="arabic-area"></div>
  <div id="text-area"></div>
</div>

<!-- 커스텀 슬라이드 전용 오버레이 -->
<div id="custom-overlay"></div>

<!-- 단축키 바 -->
<div id="toolbar">
  <button class="tb-btn" id="btn-menu"><span class="kb">M</span> 메뉴</button>
  <button class="tb-btn" id="btn-audio"><span class="kb">S</span> 오디오</button>
  <button class="tb-btn" id="btn-meaning"><span class="kb">Space</span> 해석</button>
  <button class="tb-btn" id="btn-nass"><span class="kb">T</span> 지문</button>
</div>

<audio id="slide-audio"></audio>

<script>
// ── 설정 ──────────────────────────────────────────
const SHEET_ID = '1U8mOSsJG206Z3kzdjKmP69bJOBi8oxSVq6NrXRJRWd8';
const _params  = new URLSearchParams(location.search);
let CHAPTER    = parseInt(_params.get('chapter')) || 1;
const TABS = { pattern:'pattern', drill:'drill', expression:'expression', nass:'nass' };
const TYPE_EN  = { pattern:'PATTERN', repertory:'PATTERN', drill:'DRILL', exp:'EXPRESSION', nass:'NASS', custom:'PATTERN' };
const TYPE_KO  = { pattern:'패턴', repertory:'패턴', drill:'드릴', exp:'익스프레션', nass:'나스', custom:'패턴' };

// ── 상태 ──────────────────────────────────────────
let slides = [], current = 0;
let meaningVisible = true;   // true = 해석 보임
let nassTextVisible = false; // 나스 지문 기본 숨김
let sidebarOpen = false;
let audioPlaying = false;
let currentUnit = 1;

// ── JSONP 데이터 로더 ──────────────────────────────
const _cache = {};
function fetchSheetData(name) {
  if (_cache[name]) return Promise.resolve(_cache[name]);
  return new Promise((resolve, reject) => {
    const cb = '__gviz_' + name.replace(/\W/g,'') + '_' + Date.now();
    const timer = setTimeout(() => { delete window[cb]; reject(new Error('Timeout: '+name)); }, 15000);
    window[cb] = resp => {
      clearTimeout(timer);
      delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
      try {
        if (!resp?.table) throw new Error('No data: '+name);
        const cols = resp.table.cols;
        const headers = cols.map(c => (c.label||c.id||'').toLowerCase().trim());
        const rows = (resp.table.rows||[]).map(row => {
          const obj = {};
          headers.forEach((h,i) => {
            if (!h) return;
            const cell = row.c?.[i];
            obj[h] = (cell && cell.v != null) ? String(cell.v).trim() : '';
          });
          return obj;
        }).filter(r => Object.values(r).some(v => v !== ''));
        _cache[name] = rows;
        resolve(rows);
      } catch(e) { reject(e); }
    };
    const script = document.createElement('script');
    script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${cb}&sheet=${encodeURIComponent(name)}`;
    script.onerror = () => { clearTimeout(timer); delete window[cb]; reject(new Error('Fail: '+name)); };
    document.head.appendChild(script);
  });
}

// ── parseText ──────────────────────────────────────
function parseText(str) {
  if (!str) return '';
  return str
    .replace(/_([^_\n]+)_/g, '<span class="highlight-box">$1</span>')
    .replace(/\*([^*\n]+)\*/g, '<span class="highlight-text">$1</span>');
}

// ── 커스텀 슬라이드 (서버 필요, 없으면 null) ──────────
async function loadCustomSlide(path) {
  try {
    const res = await fetch(path);
    if (!res.ok) return null;
    return await res.text();
  } catch { return null; }
}

// ── buildSlides ────────────────────────────────────
async function buildSlides(unit) {
  currentUnit = unit;
  slides = [];
  nassTextVisible = false;

  const [drillRaw, patRaw, expRaw, nassRaw] = await Promise.all([
    fetchSheetData(TABS.drill),
    fetchSheetData(TABS.pattern),
    fetchSheetData(TABS.expression),
    fetchSheetData(TABS.nass),
  ]);

  const ch = CHAPTER;
  const pRows  = patRaw.filter(r => +r.c === ch && +r.u === unit);
  const eRows  = expRaw.filter(r => +r.c === ch && +r.u === unit);
  const nRows  = nassRaw.filter(r => +r.c === ch && +r.u === unit);

  // 패턴 그룹화 (순서 유지)
  const groups = {};
  const order  = [];
  pRows.forEach(r => {
    const pid = r.id_pattern;
    if (!groups[pid]) { groups[pid] = []; order.push(pid); }
    groups[pid].push(r);
  });

  // 드릴: 이 유닛 패턴의 id_pattern 값으로만 필터 (드릴탭에 U컬럼 없음)
  const unitPatternIds = new Set(order);
  const drills = drillRaw.filter(r => unitPatternIds.has(r.id_pattern));

  // 패턴 → 레퍼토리 → 드릴 순서
  for (const pid of order) {
    const rows = groups[pid];
    const patRow = rows.find(r => r.category === 'pattern');
    const repRows = rows.filter(r => r.category === 'repertory');
    const label = patRow ? (patRow.korean || patRow.arabic) : pid;

    // 패턴 슬라이드: slides/p01-1.html 있으면 커스텀, 없으면 기본
    if (patRow) {
      const customHtml = await loadCustomSlide(`slides/${pid}.html`);
      if (customHtml) {
        slides.push({ type:'custom', html:customHtml, pid, unit, label });
      } else {
        slides.push({ type:'pattern', data:patRow, unit, label });
      }
    }

    // 레퍼토리 슬라이드: id_repertory 있으면 slides/r01-1-1.html 시도
    for (const r of repRows) {
      if (r.id_repertory) {
        const customHtml = await loadCustomSlide(`slides/${r.id_repertory}.html`);
        if (customHtml) {
          slides.push({ type:'custom', html:customHtml, pid, unit, label });
          continue;
        }
      }
      slides.push({ type:'repertory', data:r, unit, label });
    }

    // 드릴: id_pattern 값으로 매칭
    drills.filter(r => r.id_pattern === pid)
          .forEach(r => slides.push({ type:'drill', data:r, unit, label }));
  }

  // 익스프레션
  eRows.forEach(r => slides.push({ type:'exp', data:r, unit, label:'Expression' }));

  // 나스
  nRows.forEach(r => slides.push({ type:'nass', data:r, unit, label:'Nass' }));

  current = 0;
  buildIndex();
  renderSlide();
}

// ── renderSlide ────────────────────────────────────
function renderSlide() {
  if (!slides.length) return;
  const s = slides[current];

  // 진행바
  document.getElementById('progress').style.width = ((current+1)/slides.length*100)+'%';

  // 코너 텍스트
  document.getElementById('ui-tl').textContent = `Unit ${s.unit} · ${s.label||''}`;
  document.getElementById('ui-tr').textContent = TYPE_EN[s.type] || s.type.toUpperCase();

  // 나스 버튼 표시
  document.getElementById('btn-nass').style.display = s.type === 'nass' ? 'flex' : 'none';

  // ── 커스텀 슬라이드 ──
  if (s.type === 'custom') {
    const overlay = document.getElementById('custom-overlay');
    overlay.innerHTML = s.html;
    overlay.classList.add('active');
    document.getElementById('main').style.visibility = 'hidden';
    document.getElementById('arabic-area').innerHTML = '';
    document.getElementById('text-area').innerHTML = '';
    updateIndex(); return;
  }
  // 커스텀가 아닌 경우 오버레이 닫기
  document.getElementById('custom-overlay').classList.remove('active');
  document.getElementById('main').style.visibility = '';

  // ── 나스 슬라이드 ──
  if (s.type === 'nass') {
    renderNass(s); updateIndex(); return;
  }

  // ── 일반 슬라이드 ──
  const d = s.data;
  document.getElementById('arabic-area').innerHTML =
    `<div class="arabic">${parseText(d.arabic||'')}</div>`;

  const mainEl = document.getElementById('main');
  const showMeaning = meaningVisible;

  document.getElementById('text-area').innerHTML = `
    <div class="korean ${showMeaning?'':'hidden-k'}">${parseText(d.korean||'')}</div>
    ${d.note ? `<div class="note ${showMeaning?'':'hidden-k'}">${parseText(d.note)}</div>` : ''}
  `;

  if (!showMeaning) {
    document.querySelectorAll('#text-area .hidden-k').forEach(el => el.style.opacity = '0');
  }

  updateIndex();
}

function renderNass(s) {
  const d = s.data;
  const nassId = d.id_lc || '';
  const sual = d.sual || '';

  const promptHtml = `
    <div class="nass-prompt">
      ${nassId ? `<div class="nass-id">${nassId}</div>` : ''}
      ${sual ? `<div class="nass-sual" dir="rtl">${parseText(sual)}</div>` : ''}
    </div>`;

  const nassTextHtml = `
    <div class="nass-arabic-wrap">
      <div class="arabic" dir="rtl">${parseText(d.arabic||'')}</div>
    </div>`;

  document.getElementById('arabic-area').innerHTML =
    nassTextVisible ? (nassTextHtml + promptHtml) : promptHtml;
  document.getElementById('text-area').innerHTML = '';
}

// ── 의미 토글 (전역 지속) ───────────────────────────
function toggleMeaning() {
  meaningVisible = !meaningVisible;
  document.getElementById('btn-meaning').classList.toggle('active', !meaningVisible);
  const s = slides[current];
  if (!s || s.type === 'nass' || s.type === 'custom') return;
  document.querySelectorAll('#text-area .korean, #text-area .note').forEach(el => {
    el.style.opacity = meaningVisible ? '1' : '0';
  });
}

// ── 나스 지문 토글 ─────────────────────────────────
function toggleNass() {
  nassTextVisible = !nassTextVisible;
  document.getElementById('btn-nass').classList.toggle('active', nassTextVisible);
  const s = slides[current];
  if (s?.type === 'nass') renderNass(s);
}

// ── 사이드바 ──────────────────────────────────────
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('open', sidebarOpen);
  document.getElementById('btn-menu').classList.toggle('active', sidebarOpen);
}

// ── 인덱스 ────────────────────────────────────────
function buildIndex() {
  const list = document.getElementById('index-list');
  list.innerHTML = '';
  slides.forEach((s, i) => {
    const li = document.createElement('li');
    li.className = 'idx-item';
    li.dataset.idx = i;
    const tag = TYPE_KO[s.type] || s.type;
    const preview = s.type === 'nass' ? (s.data?.id_lc || '나스')
      : s.type === 'custom' ? s.pid
      : (s.data?.arabic || '').substring(0,18);
    li.innerHTML = `<span class="idx-tag">${tag}</span><span class="idx-ar">${preview}</span>`;
    li.onclick = () => { current = i; renderSlide(); updateIndex(); if(sidebarOpen) toggleSidebar(); };
    list.appendChild(li);
  });
  updateIndex();
}

function updateIndex() {
  document.querySelectorAll('.idx-item').forEach(el => {
    el.classList.toggle('active', +el.dataset.idx === current);
  });
  const active = document.querySelector('.idx-item.active');
  if (active) active.scrollIntoView({ block:'nearest', behavior:'smooth' });
}

// ── 유닛 버튼 ─────────────────────────────────────
function buildUnitButtons(units, ch) {
  const c = document.getElementById('sb-units');
  c.innerHTML = '';
  units.forEach(u => {
    const btn = document.createElement('button');
    btn.className = 'unit-btn';
    btn.textContent = `Unit ${u}`;
    btn.dataset.u = u;
    btn.onclick = async () => {
      history.replaceState(null, '', `?chapter=${ch}&unit=${u}`);
      document.getElementById('loading').style.display = 'flex';
      document.querySelectorAll('#sb-units .unit-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      await buildSlides(u);
      document.getElementById('loading').style.display = 'none';
    };
    c.appendChild(btn);
  });
  const first = c.querySelector('.unit-btn');
  if (first) first.classList.add('active');
}

// ── 오디오 ────────────────────────────────────────
function toggleAudio() {
  const audio = document.getElementById('slide-audio');
  const s = slides[current];
  const url = s?.data?.audiourl1 || s?.data?.url_expression || '';
  if (audioPlaying) {
    audio.pause(); audio.currentTime = 0;
    audioPlaying = false;
    document.getElementById('btn-audio').classList.remove('active');
  } else if (url) {
    audio.src = url;
    audio.play().catch(() => {});
    audioPlaying = true;
    document.getElementById('btn-audio').classList.add('active');
    audio.onended = () => {
      audioPlaying = false;
      document.getElementById('btn-audio').classList.remove('active');
    };
  }
}

// ── 내비게이션 ────────────────────────────────────
function goTo(n) {
  if (!slides.length) return;
  current = Math.max(0, Math.min(slides.length - 1, n));
  nassTextVisible = false;
  renderSlide();
}

// ── 키보드 ────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  switch(e.key) {
    case 'ArrowRight': case 'ArrowDown': e.preventDefault(); goTo(current+1); break;
    case 'ArrowLeft':  case 'ArrowUp':   e.preventDefault(); goTo(current-1); break;
    case ' ':          e.preventDefault(); toggleMeaning(); break;
    case 'm': case 'M': toggleSidebar(); break;
    case 't': case 'T': if(slides[current]?.type==='nass') toggleNass(); break;
    case 's': case 'S': toggleAudio(); break;
    case 'Escape': if(sidebarOpen) toggleSidebar(); break;
  }
});

// ── 버튼 ──────────────────────────────────────────
document.getElementById('btn-menu').onclick    = toggleSidebar;
document.getElementById('btn-audio').onclick   = toggleAudio;
document.getElementById('btn-meaning').onclick = toggleMeaning;
document.getElementById('btn-nass').onclick    = toggleNass;

// ── 초기화 ────────────────────────────────────────────────
async function init() {
  try {
    const patData = await fetchSheetData(TABS.pattern);

    // 전체 챕터 목록 자동 감지
    const chapters = [...new Set(
      patData.filter(r => +r.c > 0).map(r => +r.c)
    )].sort((a,b) => a - b);
    buildChapterButtons(chapters, patData);

    await loadChapter(CHAPTER, patData);
  } catch(e) {
    document.getElementById('loading').textContent = '로딩 실패: ' + e.message;
    console.error(e); return;
  }
  document.getElementById('loading').style.display = 'none';
}

function buildChapterButtons(chapters, patData) {
  const c = document.getElementById('sb-chapters');
  // 라벨 스팬은 유지
  chapters.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'ch-btn unit-btn';
    btn.textContent = `${ch}과`;
    btn.dataset.ch = ch;
    btn.onclick = async () => {
      document.getElementById('loading').style.display = 'flex';
      await loadChapter(ch, patData);
    };
    c.appendChild(btn);
  });
  const cur = c.querySelector(`[data-ch="${CHAPTER}"]`);
  if (cur) cur.classList.add('active');
}

async function loadChapter(ch, patData) {
  CHAPTER = ch;
  history.replaceState(null, '', `?chapter=${ch}`);
  document.title = `올댓아라빅 ${ch}과`;

  document.querySelectorAll('.ch-btn').forEach(b =>
    b.classList.toggle('active', +b.dataset.ch === ch));

  const units = [...new Set(
    patData.filter(r => +r.c === ch && +r.u > 0).map(r => +r.u)
  )].sort((a,b) => a - b);

  buildUnitButtons(units, ch);
  document.getElementById('loading').style.display = 'flex';
  await buildSlides(units[0] || 1);
  document.getElementById('loading').style.display = 'none';
}

init();
</script>
