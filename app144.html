<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>올댓아라빅 1.4.4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@500;700&family=Noto+Kufi+Arabic:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/spoqa/spoqa-han-sans@latest/css/SpoqaHanSansNeo.css" rel="stylesheet">
<style>
@font-face {
  font-family: 'Dongol';
  src: url('Dongol-Regular.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
}
/* ── 리셋 & 변수 ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #F2F4F6;
  --accent: #1D49FF;
  --text:   #12205A;
  --sub:    #888FAC;
  --border: #D5DAE8;
}
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Spoqa Han Sans Neo', 'Apple SD Gothic Neo', sans-serif;
  height: 100vh;
  position: relative;
}

/* ── 4 코너 ── */
#ui-tl, #ui-bl, #ui-br { position: fixed; z-index: 10; }
#ui-tl {
  top: clamp(1rem,3vw,2rem); left: clamp(1rem,3vw,3rem);
  font-size: clamp(0.8rem,1.8vw,1.3rem);
  font-weight: bold; color: var(--text);
  line-height: 1.4; max-width: 75vw;
}
#ui-tr {
  font-size: clamp(0.55rem,0.85vw,0.75rem);
  text-transform: uppercase;
  letter-spacing: 2.5px;
  color: var(--sub);
  opacity: 0.65;
  white-space: nowrap;
  margin-bottom: 0.5rem;
}
#ui-bl {
  bottom: clamp(1rem,3vw,2rem); left: clamp(1rem,3vw,3rem);
  font-size: clamp(0.65rem,1.2vw,1rem);
  color: var(--sub);
}
#ui-br {
  bottom: clamp(1rem,3vw,2rem); right: clamp(1rem,3vw,3rem);
}
#ui-br img {
  width: clamp(60px, 7vw, 110px);
  opacity: 0.85;
  display: block;
}

/* ── 진행바 ── */
#progress {
  position: fixed; top: 0; left: 0;
  height: 3px; background: var(--accent);
  transition: width 0.3s; z-index: 50;
}

/* ── 메인 콘텐츠 ── */
#main {
  position: fixed;
  top: 0; bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: min(92vw, 1400px);
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: clamp(1rem, 3vh, 2.5rem);
  padding: clamp(60px,10vh,100px) clamp(1rem,4vw,3rem) clamp(80px,12vh,120px);
}

/* ── 아랍어 ── */
.arabic {
  font-family: 'Noto Sans Arabic', serif;
  font-size: clamp(3rem, 9vw, 9rem);
  font-weight: 700;
  direction: rtl;
  line-height: 1.6;
  text-align: center;
}
/* A/G 유닛: 문장형이라 폰트 살짝 축소 */
.arabic.arabic-sentence {
  font-size: clamp(2rem, 6vw, 6rem);
}

/* ── 한국어/노트 ── */
.korean {
  display: block;
  font-size: clamp(1.2rem, 3.5vw, 3.5rem);
  transition: opacity 0.3s;
  line-height: 1.4;
}
.note {
  display: block;
  font-size: clamp(0.9rem, 2.2vw, 2.2rem);
  color: var(--sub);
  transition: opacity 0.3s;
  line-height: 1.4;
  margin-top: 0.4em;
}
/* ── writing 타입 ── */
.arabic-writing {
  font-family: 'Dongol', 'Noto Kufi Arabic', 'Noto Sans Arabic', serif !important;
  font-weight: normal;
  letter-spacing: 0.05em;
}
/* ── 나스 korean 힌트 ── */
.nass-korean-hint {
  font-size: clamp(0.65rem, 1.2vw, 1rem);
  color: #fff;
  opacity: 0.85;
  text-align: center;
  margin-top: 0.5rem;
}
#text-area { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; min-height: 2rem; }

/* ── 하이라이트 ── */
.highlight-box {
  border: 3px solid var(--accent);
  background: rgba(29,73,255,0.08);
  border-radius: 14px;
  padding: 0.3em 0.45em 0.25em;
  margin: 0 0.2em;
  display: inline-block;
  vertical-align: middle;
  min-width: 1.4em;
  text-align: center;
  line-height: 1.3;
}
.highlight-text { color: var(--accent); font-weight: bold; }

/* ── 나스 슬라이드 ── */
.nass-prompt {
  display: flex; flex-direction: column;
  align-items: center; gap: 0.8rem;
  min-height: 4rem;
}
.nass-sual {
  font-family: 'Noto Kufi Arabic', 'Noto Sans Arabic', serif;
  font-size: clamp(1.1rem, 2.5vw, 2.2rem);
  font-weight: 400;
  color: var(--sub);
  direction: rtl;
  text-align: center;
}
.nass-arabic-wrap {
  max-height: 55vh; overflow-y: auto;
  width: 100%; padding: 0 clamp(1rem,5vw,4rem);
}
.nass-arabic-wrap .arabic {
  font-family: 'Noto Sans Arabic', serif;
  font-size: clamp(1.2rem, 3.2vw, 3.8rem);
  text-align: center;
  direction: rtl;
  line-height: 2;
}
.nass-sual-note {
  font-family: 'Noto Kufi Arabic', 'Noto Sans Arabic', serif;
  font-size: clamp(0.75rem, 1.5vw, 1.3rem);
  color: var(--sub);
  direction: rtl;
  text-align: center;
  margin-top: 0.3em;
  opacity: 0.8;
}

/* ── 사이드바 ── */
#sidebar {
  position: fixed; top: 0; left: 0;
  width: min(440px, 92vw); height: 100%;
  background: rgba(245,247,252,0.98);
  border-right: 2px solid var(--accent);
  transform: translateX(-100%);
  transition: transform 0.3s ease;
  z-index: 200;
  display: flex; flex-direction: column;
  box-shadow: 5px 0 30px rgba(29,73,255,0.12);
}
#sidebar.open { transform: translateX(0); }
.sb-head {
  padding: 1.2rem 1.8rem 1rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sb-head h2 {
  color: var(--accent);
  font-size: clamp(0.85rem,1.6vw,1.1rem);
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 0.9rem;
}
/* 단축키 목록 */
.key-list { list-style: none; }
.key-row {
  display: flex; align-items: center; gap: 10px;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
  font-size: clamp(0.62rem,1.1vw,0.8rem);
  color: var(--sub);
}
.key-row:last-child { border-bottom: none; }
.key-row .key-desc { flex: 1; }
.key-row .key-icon { font-size: 1em; opacity: 0.7; width: 1.2em; text-align: center; flex-shrink: 0; }
.key {
  display: inline-flex; align-items: center; justify-content: center;
  background: #fff; border: 1.5px solid var(--border);
  padding: 1px 7px; border-radius: 5px;
  font-weight: 700; color: var(--text);
  font-size: 0.85em; white-space: nowrap;
  box-shadow: 0 1px 3px rgba(29,73,255,0.08);
  min-width: 1.8em;
}

#index-list {
  list-style: none; overflow-y: auto; flex: 1; padding: 0.4rem 0;
}
.idx-item {
  padding: 0.6rem 1.6rem;
  font-size: clamp(0.72rem,1.5vw,1rem);
  color: var(--sub); cursor: pointer;
  border-left: 4px solid transparent;
  transition: all 0.15s;
  display: flex; gap: 0.7rem; align-items: baseline;
}
.idx-item:hover { background: rgba(29,73,255,0.06); color: var(--text); }
.idx-item.active { background: rgba(29,73,255,0.1); color: var(--text); border-left-color: var(--accent); }
.idx-tag {
  font-size: 0.7em; color: var(--accent);
  background: rgba(29,73,255,0.1);
  padding: 1px 6px; border-radius: 4px;
  flex-shrink: 0; text-transform: uppercase;
  font-weight: 700;
}

.idx-ko { font-size: 0.78em; color: var(--sub); display: block; margin-top: 1px; direction: ltr; text-align: left; }
.idx-ar { font-family: 'Noto Sans Arabic', serif; direction: rtl; text-align: left; }


/* ── 섹션 탭 (메인 화면 상단) ── */
#section-tabs {
  display: flex; gap: 0.4rem; flex-wrap: nowrap; align-items: center; margin-top: 0;
}
.sec-tab {
  background: #fff; border: 1.5px solid var(--border); border-radius: 6px;
  color: var(--sub); cursor: pointer; font-family: inherit;
  font-size: clamp(0.5rem, 0.85vw, 0.68rem); line-height: 1.3;
  padding: 2px 9px; text-align: center; transition: all 0.15s; white-space: nowrap;
}
.sec-tab small { display: block; font-size: 0.85em; opacity: 0.7; }
.sec-tab:hover { border-color: var(--accent); color: var(--accent); }
.sec-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: bold; }
.sec-tab.disabled { opacity: 0.25; cursor: default; pointer-events: none; }

/* ── 하단 단축키 바 ── */
#toolbar {
  position: fixed;
  bottom: clamp(0.8rem,2vw,1.5rem);
  left: 50%; transform: translateX(-50%);
  display: flex; gap: clamp(0.7rem,1.8vw,1.5rem);
  z-index: 30; align-items: center;
  background: rgba(255,255,255,0.85);
  border: 1px solid var(--border);
  border-radius: 30px;
  padding: 5px 18px;
  backdrop-filter: blur(8px);
  box-shadow: 0 2px 12px rgba(29,73,255,0.08);
}
.tb-btn {
  background: transparent; border: none;
  color: var(--sub); cursor: pointer;
  font-size: clamp(0.55rem,0.82vw,0.72rem);
  font-family: inherit;
  display: flex; align-items: center; gap: 4px;
  opacity: 0.7; transition: opacity 0.15s, color 0.15s;
  padding: 2px 0;
  white-space: nowrap;
}
.tb-btn:hover { opacity: 1; color: var(--accent); }
.tb-btn.active { opacity: 1; color: var(--accent); }
.tb-btn .kb {
  display: inline-flex; align-items: center; justify-content: center;
  background: #fff; border: 1.5px solid var(--border);
  border-radius: 4px; padding: 0px 5px;
  font-size: 0.88em; color: var(--text); font-weight: 700;
  min-width: 1.6em;
  box-shadow: 0 1px 2px rgba(29,73,255,0.07);
}
#btn-nass { display: none; }

/* ── 로딩 ── */
#loading {
  position: fixed; inset: 0;
  background: var(--accent);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 1.4rem;
  z-index: 999;
}
#loading img {
  width: clamp(80px, 12vw, 140px);
  filter: brightness(0) invert(1);
}
#loading .loading-label {
  font-size: clamp(0.7rem, 1.2vw, 0.95rem);
  color: rgba(255,255,255,0.75);
  letter-spacing: 2.5px;
  text-transform: lowercase;
  font-weight: 400;
}

/* ── 시작 오버레이 ── */
#start-overlay {
  position: fixed; inset: 0;
  background: rgba(235,238,248,0.95);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 998; cursor: pointer;
  gap: 1.2rem;
}
#start-overlay .start-logo {
  width: clamp(80px, 10vw, 140px);
  margin-bottom: 0.5rem;
}
#start-overlay .start-text {
  font-size: clamp(0.9rem, 2vw, 1.3rem);
  color: var(--sub);
  letter-spacing: 1px;
}
#start-overlay .start-btn {
  margin-top: 0.5rem;
  padding: 0.6em 2em;
  border: 1.5px solid var(--accent);
  border-radius: 30px;
  background: transparent;
  color: var(--accent);
  font-size: clamp(0.9rem, 1.8vw, 1.2rem);
  font-family: inherit;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
#start-overlay .start-btn:hover {
  background: var(--accent); color: #fff;
}
</style>
</head>
<body>

<div id="loading">
  <img src="assets/ata-logo2.png" alt="All That Arabic">

</div>
<div id="start-overlay" style="display:none;">
  <img class="start-logo" src="assets/ata-logo2.png" alt="All That Arabic">

  <button class="start-btn">▶ 시작하기</button>
</div>
<div id="progress"></div>

<!-- 코너 -->
<div id="ui-tl"></div>
<div id="ui-bl">© Markaz Arabic</div>
<div id="ui-br"><img src="assets/ata-logo2.png" alt="All That Arabic"></div>

<!-- 사이드바 -->
<div id="sidebar">
  <div class="sb-head">
    <h2>All That Arabic 1.4.4</h2>
    <ul class="key-list">
      <li class="key-row"><span class="key">M</span><span class="key-desc">메뉴 열기/닫기</span></li>
      <li class="key-row"><span class="key">Space</span><span class="key-desc">해석 보기/가리기</span></li>
      <li class="key-row"><span class="key">A</span><span class="key-desc">본문 보기/가리기</span></li>
      <li class="key-row"><span class="key">T</span><span class="key-desc">지문 보기/가리기 (나스)</span></li>
      <li class="key-row"><span class="key">S</span><span class="key-desc">오디오 재생/정지</span></li>
      <li class="key-row"><span class="key">← →</span><span class="key-desc">이전 / 다음 슬라이드</span></li>
      <li class="key-row"><span class="key">Home</span><span class="key">End</span><span class="key-desc">처음 / 마지막</span></li>
    </ul>

<!-- 메인 -->
<div id="main">
  <div id="ui-tr">PATTERN</div>
  <div id="arabic-area"></div>
  <div id="text-area"></div>
</div>

<!-- 단축키 바 -->
<div id="toolbar">
  <button class="tb-btn" id="btn-menu"><span class="kb">M</span> 메뉴</button>
  <button class="tb-btn" id="btn-audio"><span class="kb">S</span> 오디오</button>
  <button class="tb-btn" id="btn-meaning"><span class="kb">Space</span> 해석</button>
  <button class="tb-btn" id="btn-arabic"><span class="kb">A</span> 본문</button>
  <button class="tb-btn" id="btn-nass"><span class="kb">T</span> 지문</button>
</div>

<audio id="slide-audio"></audio>

<script>
// ── 설정 ──────────────────────────────────────────────
const SHEET_ID   = '1w7e0mLLgFhzU7Ixs6CUfzgrwUG6EEy8jHijXF5UJwY8';
const AUDIO_BASE = 'https://storage.googleapis.com/all-that-arabic-14';
const AUDIO_FOLDER = 'listening(144)';

// 1.4.4 시트 탭명
const TAB_PATTERN = 'pattern';
const TAB_DRILL   = 'drill';
const TAB_KALIMAT = 'kalimat';
const TAB_NASS    = 'nass';


const TYPE_EN = { ptn:'PATTERN', ptna:'PATTERN A', ptnb:'PATTERN B', repertory:'REPERTORY', mithal:'MITHĀL', drilla:'DRILL A', drillb:'DRILL B', summary:'SUMMARY', exp:'EXPRESSION', kalimat:'KALIMAT', nass:'NASS', writing:'WRITING' };
const TYPE_KO = { ptn:'패턴', ptna:'패턴A', ptnb:'패턴B', repertory:'레퍼토리', mithal:'미싸알', drilla:'드릴A', drillb:'드릴B', summary:'요약', exp:'표현', kalimat:'칼리마트', nass:'나스', writing:'쓰기' };

// ── 상태 ──────────────────────────────────────────────
let slides = [], current = 0;
let meaningVisible = true;
let arabicVisible = true;
let nassTextVisible = false;
let sidebarOpen = false;
let _firstLoad = true;
let audioPlaying = false;
let currentPg = null;

// ── 유틸 ──────────────────────────────────────────────
// datasheet type 정규화: 'pattern(p)', 'repertorie' 등 → 내부 키
function normalizeType(t) {
  if (!t) return '';
  const tl = t.toLowerCase().trim();
  if (tl === 'ptn') return 'ptn';
  if (tl === 'ptna' || tl === 'pattern(a)') return 'ptna';
  if (tl === 'ptnb' || tl === 'pattern(p)') return 'ptnb';
  if (tl === 'drilla' || tl === 'drill') return 'drilla';
  if (tl === 'drillb') return 'drillb';
  if (tl === 'mithal' || tl === 'mithāl') return 'mithal';
  if (tl === 'repertorie' || tl === 'repertory') return 'repertory';
  if (tl === 'exp' || tl === 'expression') return 'exp';
  if (tl === 'kalimat') return 'kalimat';
  if (tl === 'nass') return 'nass';
  if (tl === 'writing') return 'writing';
  if (tl === 'summary') return 'summary';
  if (tl.startsWith('pattern')) return 'ptna';
  return tl;
}

// 서브패턴 접미 알파벳 제거 → 베이스 유닛
// 'A01a' → 'A01',  'P01' → 'P01',  'G00' → 'G00'
function getBaseUnit(u) {
  return (u || '').replace(/[a-z]+$/, '');
}

// 행의 U값: u 컬럼 우선, 없으면 id에서 추출 ('P01-pat01' → 'P01')
function getRowU(r) {
  if (r.u) return r.u;
  const id = r.id || r.id_datasheet || '';
  return id.split('-')[0] || '';
}

// 행의 ID값: id > id_datasheet > id_nass > id_words 순
function getRowId(r) {
  return r.key_ptn || r.key_drill || r.id_nass || r.id || r.id_datasheet || r.id_words || '';
}

// ── JSONP 데이터 로더 ──────────────────────────────────
const _cache = {};
// name: 시트명 또는 캐시 키. gid가 있으면 gid로 fetch, 없으면 sheet명으로 fetch
function fetchSheetData(name, gid = null) {
  const cacheKey = gid ? ('gid:' + gid) : name;
  if (_cache[cacheKey]) return Promise.resolve(_cache[cacheKey]);
  return new Promise((resolve, reject) => {
    const cb = '__gviz_' + cacheKey.replace(/\W/g,'') + '_' + Date.now();
    const timer = setTimeout(() => { delete window[cb]; reject(new Error('Timeout: '+cacheKey)); }, 15000);
    window[cb] = resp => {
      clearTimeout(timer);
      delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
      try {
        if (!resp?.table) throw new Error('No data: '+cacheKey);
        const cols = resp.table.cols;
        const headers = cols.map(c => (c.label||'').toLowerCase().trim());
        const rows = (resp.table.rows||[]).map(row => {
          const obj = {};
          headers.forEach((h,i) => {
            if (!h) return;
            const cell = row.c?.[i];
            const _val = (cell && cell.v != null)
              ? (cell.f != null && (
                   (typeof cell.v === 'string' && cell.v.startsWith('Date(')) ||
                   typeof cell.v === 'number'
                 ) ? cell.f : cell.v)
              : null;
            obj[h] = _val != null ? String(_val).trim() : '';
          });
          return obj;
        }).filter(r => Object.values(r).some(v => v !== ''));
        _cache[cacheKey] = rows;
        resolve(rows);
      } catch(e) { reject(e); }
    };
    const script = document.createElement('script');
    const param = gid ? `gid=${gid}` : `sheet=${encodeURIComponent(name)}`;
    script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${cb}&${param}&headers=1`;
    script.onerror = () => { clearTimeout(timer); delete window[cb]; reject(new Error('Fail: '+cacheKey)); };
    document.head.appendChild(script);
  });
}

// ── parseText ──────────────────────────────────────────
function parseText(str) {
  if (!str) return '';
  return str
    .replace(/<br\s*\/?>/gi, '<br>')
    .replace(/\n|\r\n|\r/g, '<br>')
    .replace(/_([^_\n]+)_/g, '<span class="highlight-box">$1</span>')
    .replace(/\*([^*\n]+)\*/g, '<span class="highlight-text">$1</span>');
}

// ── buildSlides ────────────────────────────────────────
// baseUnit: 'P01', 'G00', 'A01' 등 (서브패턴 접미 없는 기본 식별자)
async function buildSlides(baseUnit) {
  slides = [];
  nassTextVisible = false;
  currentPg = baseUnit;
  // 현재 유닛을 URL에 저장 → 새로고침 시 복원
  const _usp = new URLSearchParams(location.search);
  _usp.set('unit', baseUnit);
  history.replaceState(null, '', '?' + _usp.toString());

  // 탭 병렬 로드
  const [drillRaw, kalimatRaw, nassRaw] = await Promise.all([
    fetchSheetData(TAB_DRILL),
    fetchSheetData(TAB_KALIMAT),
    fetchSheetData(TAB_NASS),
  ]);

  const escaped = baseUnit.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const subRegex = new RegExp('^' + escaped + '[a-z]?$', 'i');
  const isConfirmed = r => (r.status || '').toLowerCase() === 'confirmed';
  const inUnit = r => subRegex.test(getRowU(r));

  // 드릴탭: drillA 타입, status=confirmed, 해당 유닛, 시트 순서 그대로
  drillRaw
    .filter(r => inUnit(r) && isConfirmed(r))
    .forEach(r => slides.push({ type: normalizeType(r.type), data: r, pg: baseUnit, label: baseUnit }));

  // kalimat탭: exp/kalimat 타입, status=confirmed, 해당 유닛
  kalimatRaw
    .filter(r => inUnit(r) && isConfirmed(r))
    .forEach(r => slides.push({ type: normalizeType(r.type), data: r, pg: baseUnit, label: baseUnit }));

  // nass탭: status=confirmed, 해당 유닛
  nassRaw
    .filter(r => inUnit(r) && isConfirmed(r))
    .forEach(r => slides.push({ type: 'nass', data: r, pg: baseUnit, label: baseUnit }));

  if (_firstLoad) {
    const savedSlide = parseInt(new URLSearchParams(location.search).get('slide')) || 0;
    current = Math.max(0, Math.min(slides.length - 1, savedSlide));
    _firstLoad = false;
  } else {
    current = 0;
  }

  buildIndex();
  renderSlide();
}

// ── renderSlide ────────────────────────────────────────
function renderSlide() {
  if (!slides.length) return;
  const s = slides[current];

  // 진행바
  document.getElementById('progress').style.width = ((current+1)/slides.length*100)+'%';

  // 중앙 타입 레이블 업데이트
  const typeLabel = TYPE_EN[s.type] || s.type.toUpperCase();
  const nassNum = s.type === 'nass' ? (() => { const m = getRowId(s.data).match(/(\d+)$/); return m ? ' · nass-' + m[1] : ''; })() : '';
  document.getElementById('ui-tr').textContent = typeLabel + nassNum;

  // 상단 좌측: 현재 유닛의 ptnA 아랍어/한국어 고정 표시 + 섹션 탭
  const tl = document.getElementById('ui-tl');
  const curPgU = s.pg || '';
  const patternRaw = _cache['pattern'] || [];
  const ptnARow = patternRaw.find(r => normalizeType(r.type) === 'ptna' && getBaseUnit(getRowU(r)) === getBaseUnit(curPgU));
  const tlArabic = (ptnARow?.arabic || '').substring(0, 30);
  const tlKorean = (ptnARow?.korean || '').substring(0, 28);
  tl.innerHTML =
    `<div style="display:flex;align-items:center;gap:1.4rem;">` +
      `<div>` +
        `<div style="font-size:clamp(0.45rem,0.7vw,0.6rem);text-transform:uppercase;letter-spacing:2px;color:var(--sub);opacity:0.6;margin-bottom:0.2rem;">${curPgU}</div>` +
        `<div style="display:flex;align-items:baseline;gap:0.7rem;flex-wrap:nowrap;">` +
          `<span style="font-family:'Noto Sans Arabic',serif;direction:rtl;font-size:clamp(0.9rem,1.8vw,1.4rem);font-weight:700;line-height:1.3;white-space:nowrap;">${tlArabic}</span>` +
          `<span style="font-size:clamp(0.6rem,1vw,0.85rem);color:var(--sub);white-space:nowrap;">${tlKorean}</span>` +
        `</div>` +
      `</div>` +
      `<div id="section-tabs"></div>` +
    `</div>`;
  buildSectionTabs();

  // 나스 지문 버튼: 나스 슬라이드에서만 표시
  document.getElementById('btn-nass').style.display = s.type === 'nass' ? 'flex' : 'none';
  // 오디오 버튼: 패턴 슬라이드에서는 숨김
  document.getElementById('btn-audio').style.display = s.type === 'pattern' ? 'none' : '';

  // ── 나스 슬라이드 ──
  if (s.type === 'nass') {
    renderNass(s); updateIndex(); return;
  }

  // ── 일반 슬라이드 (pattern / repertory / drill / exp / writing) ──
  const d = s.data;
  const isWriting = s.type === 'writing';
  const isSentence = /^[AG]/i.test(s.pg || '');
  const arOp = arabicVisible ? '1' : '0';
  document.getElementById('arabic-area').innerHTML =
    `<div class="arabic${isWriting ? ' arabic-writing' : ''}${isSentence ? ' arabic-sentence' : ''}" style="opacity:${arOp};transition:opacity 0.3s;">${parseText(d.arabic || '')}</div>`;

  // 래퍼토리: 해석 항상 표시 / 그 외: 전역 meaningVisible 상태 따름
  const op = (s.type === 'repertory' || meaningVisible) ? '1' : '0';
  document.getElementById('text-area').innerHTML = `
    <div class="korean" style="opacity:${op}">${parseText(d.korean || '')}</div>
    ${d.note ? `<div class="note" style="opacity:${op}">${parseText(d.note)}</div>` : ''}
  `;

  updateIndex();
}

function renderNass(s) {
  const d = s.data;
  const sual = d.sual || '';
  // sual 없으면 arabic 바로 표시, 있으면 T로 토글
  const showArabic = nassTextVisible || !sual;

  const nassTextHtml = `
    <div class="nass-arabic-wrap">
      <div class="arabic" dir="rtl">${parseText(d.arabic || '')}</div>
    </div>`;

  const promptHtml = `<div class="nass-prompt"></div>`;

  document.getElementById('arabic-area').innerHTML =
    showArabic ? (nassTextHtml + promptHtml) : promptHtml;

  const op = meaningVisible ? '1' : '0';
  document.getElementById('text-area').innerHTML = `
    ${d.korean ? `<div class="nass-korean-hint" style="opacity:${op}">${parseText(d.korean)}</div>` : ''}
    ${d.note ? `<div class="note" style="opacity:${op}">${parseText(d.note)}</div>` : ''}
    ${sual ? `<div class="nass-sual-note">${parseText(sual)}</div>` : ''}
  `;
}

// ── 의미 토글 — 래퍼토리는 무시 ─────────────────────────
function toggleMeaning() {
  if (slides[current]?.type === 'repertory') return;
  meaningVisible = !meaningVisible;
  document.getElementById('btn-meaning').classList.toggle('active', !meaningVisible);
  const s = slides[current];
  if (!s) return;
  const op = meaningVisible ? '1' : '0';
  if (s.type === 'nass') {
    renderNass(s);
  } else {
    document.querySelectorAll('#text-area .korean, #text-area .note').forEach(el => {
      el.style.opacity = op;
    });
  }
}

// ── 본문(아랍어) 토글 ──────────────────────────────────
function toggleArabic() {
  arabicVisible = !arabicVisible;
  document.getElementById('btn-arabic').classList.toggle('active', !arabicVisible);
  const el = document.querySelector('#arabic-area .arabic');
  if (el) el.style.opacity = arabicVisible ? '1' : '0';
}

// ── 나스 지문 토글 ─────────────────────────────────────
function toggleNass() {
  nassTextVisible = !nassTextVisible;
  document.getElementById('btn-nass').classList.toggle('active', nassTextVisible);
  const s = slides[current];
  if (s?.type === 'nass') renderNass(s);
}

// ── 사이드바 ──────────────────────────────────────────
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('open', sidebarOpen);
  document.getElementById('btn-menu').classList.toggle('active', sidebarOpen);
}


// ── 섹션 탭 ────────────────────────────────────────────
const SEC_DEFS = [
  { keys:['ptn','ptna'], ko:'패턴',    en:'Pattern'    },
  { keys:['drilla'],     ko:'드릴',    en:'Drill'      },
  { keys:['exp'],        ko:'표현',    en:'Expression' },
  { keys:['kalimat'],    ko:'칼리마트', en:'Kalimat'   },
  { keys:['nass'],       ko:'나스',    en:'Nass'       },
];
function buildSectionTabs() {
  const container = document.getElementById('section-tabs');
  if (!container) return;
  container.innerHTML = '';
  const curPg = slides[current]?.pg;
  SEC_DEFS.forEach(sec => {
    // 현재 유닛에서 해당 타입(복수 허용) 첫 슬라이드
    const firstIdx = slides.findIndex(s => s.pg === curPg && sec.keys.includes(s.type));
    const btn = document.createElement('button');
    btn.className = 'sec-tab' + (firstIdx === -1 ? ' disabled' : '');
    if (firstIdx !== -1) btn.onclick = () => goTo(firstIdx);
    btn.innerHTML = `${sec.ko}<small>${sec.en}</small>`;
    container.appendChild(btn);
  });
}
// ── 인덱스 빌드 ───────────────────────────────────────
function buildIndex() {
  const list = document.getElementById('index-list');
  list.innerHTML = '';
  // 패턴탭 ptnA 항목 → 내비게이터 (캐시에서)
  const patternRaw = _cache['pattern'] || [];
  patternRaw
    .filter(r => normalizeType(r.type) === 'ptna' && (r.status || '').toLowerCase() === 'confirmed')
    .forEach(ptnRow => {
      const u = getRowU(ptnRow);
      const targetIdx = slides.findIndex(s => getBaseUnit(getRowU(s.data)) === getBaseUnit(u));
      const li = document.createElement('li');
      li.className = 'idx-item';
      li.dataset.u = u;
      li.dataset.targetIdx = targetIdx;
      const ar = (ptnRow.arabic || '').substring(0, 28);
      const ko = (ptnRow.korean || '').substring(0, 26);
      li.innerHTML = `<span class="idx-tag">${u}</span><span class="idx-ar">${ar}<br><span class="idx-ko">${ko}</span></span>`;
      li.onclick = () => {
        if (targetIdx >= 0) { goTo(targetIdx); }
        if (sidebarOpen) toggleSidebar();
      };
      list.appendChild(li);
    });
}

function updateIndex() {
  const curU = slides[current] ? getBaseUnit(getRowU(slides[current].data)) : '';
  document.querySelectorAll('.idx-item').forEach(el => {
    el.classList.toggle('active', el.dataset.u && getBaseUnit(el.dataset.u) === curU);
  });
  const active = document.querySelector('.idx-item.active');
  if (active) active.scrollIntoView({ block:'nearest', behavior:'smooth' });
}

// buildUnitButtons 제거 — 내비게이터로 대체

// ── 오디오 URL ─────────────────────────────────────────
// datasheet url 컬럼 우선, 없으면 GCS listening/ 경로 (mp3 → wav 순으로 시도)
function getAudioUrls(s) {
  if (!s) return [];
  const d = s.data;
  const id = getRowId(d);
  if (d?.url) return [d.url.trim()];
  if (!id) return [];
  const base = `${AUDIO_BASE}/${AUDIO_FOLDER}/${id}`;
  return [base + '.mp3', base + '.wav'];
}

function toggleAudio() {
  const audio = document.getElementById('slide-audio');
  const s = slides[current];
  const urls = getAudioUrls(s);
  const btn = document.getElementById('btn-audio');
  if (audioPlaying) {
    audio.pause(); audio.currentTime = 0;
    audioPlaying = false;
    btn.classList.remove('active');
  } else if (urls.length) {
    const onEnd = () => { audioPlaying = false; btn.classList.remove('active'); };
    // onerror와 play().catch가 동시에 발화할 수 있으므로 guard flag 사용
    const tryPlay = (i) => {
      if (i >= urls.length) { onEnd(); return; }
      let fired = false;
      const advance = () => { if (!fired) { fired = true; tryPlay(i + 1); } };
      audio.onended = onEnd;
      audio.onerror = advance;
      audio.src = urls[i];
      audio.load();
      audio.play().catch(advance);
    };
    tryPlay(0);
    audioPlaying = true;
    btn.classList.add('active');
  }
}

// ── 내비게이션 ────────────────────────────────────────
function goTo(n) {
  if (!slides.length) return;
  const audio = document.getElementById('slide-audio');
  if (audioPlaying) {
    audio.pause(); audio.currentTime = 0; audioPlaying = false;
    document.getElementById('btn-audio').classList.remove('active');
  }
  current = Math.max(0, Math.min(slides.length - 1, n));
  const _sp = new URLSearchParams(location.search);
  _sp.set('slide', current);
  history.replaceState(null, '', '?' + _sp.toString());
  nassTextVisible = false;
  renderSlide();
}

// ── 키보드 ────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  switch(e.key) {
    case 'ArrowRight': case 'ArrowDown': e.preventDefault(); goTo(current+1); break;
    case 'ArrowLeft':  case 'ArrowUp':   e.preventDefault(); goTo(current-1); break;
    case ' ':          e.preventDefault(); toggleMeaning(); break;
    case 'a': case 'A': toggleArabic(); break;
    case 'm': case 'M': toggleSidebar(); break;
    case 't': case 'T': if (slides[current]?.type === 'nass') toggleNass(); break;
    case 's': case 'S': toggleAudio(); break;
    case 'Escape': if (sidebarOpen) toggleSidebar(); break;
    case 'End':  e.preventDefault(); goTo(slides.length - 1); break;
    case 'Home': e.preventDefault(); goTo(0); break;
  }
});

// ── 버튼 이벤트 ───────────────────────────────────────
document.getElementById('btn-menu').onclick    = toggleSidebar;
document.getElementById('btn-audio').onclick   = toggleAudio;
document.getElementById('btn-meaning').onclick = toggleMeaning;
document.getElementById('btn-arabic').onclick  = toggleArabic;
document.getElementById('btn-nass').onclick    = toggleNass;

// ── 초기화 ────────────────────────────────────────────
async function init() {
  try {
    // 모든 탭 병렬 캐싱
    await Promise.all([
      fetchSheetData(TAB_PATTERN),
      fetchSheetData(TAB_DRILL),
      fetchSheetData(TAB_KALIMAT),
      fetchSheetData(TAB_NASS),
    ]);
    // 첫 시작 유닛: drill confirmed 기준
    const drillRaw = _cache['drill'] || [];
    const baseUnits = [...new Set(
      drillRaw
        .filter(r => (r.status || '').toLowerCase() === 'confirmed')
        .map(r => getBaseUnit(getRowU(r)))
        .filter(Boolean)
    )].sort();

    const savedPg = new URLSearchParams(location.search).get('unit');
    const startPg = (savedPg && baseUnits.includes(savedPg)) ? savedPg : (baseUnits[0] || 'P01');
    await buildSlides(startPg);
  } catch(e) {
    document.getElementById('loading').textContent = '로딩 실패: ' + e.message;
    console.error(e); return;
  }
  document.getElementById('loading').style.display = 'none';
}

init();
</script>
