<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>올댓아라빅 1.4.4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@500;700&family=Noto+Kufi+Arabic:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/spoqa/spoqa-han-sans@latest/css/SpoqaHanSansNeo.css" rel="stylesheet">
<style>
@font-face {
  font-family: 'Dongol';
  src: url('Dongol-Regular.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
}
/* ── 리셋 & 변수 ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #F2F4F6;
  --accent: #1D49FF;
  --text:   #12205A;
  --sub:    #888FAC;
  --border: #D5DAE8;
}
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Spoqa Han Sans Neo', 'Apple SD Gothic Neo', sans-serif;
  height: 100vh;
  position: relative;
}

/* ── 4 코너 ── */
#ui-tl, #ui-bl, #ui-br { position: fixed; z-index: 10; }
#ui-tl {
  top: clamp(1rem,3vw,2rem); left: clamp(1rem,3vw,3rem);
  font-size: clamp(0.8rem,1.8vw,1.3rem);
  font-weight: bold; color: var(--text);
  line-height: 1.4; max-width: 75vw;
}
#ui-tr {
  font-size: clamp(0.55rem,0.85vw,0.75rem);
  text-transform: uppercase;
  letter-spacing: 2.5px;
  color: var(--sub);
  opacity: 0.65;
  white-space: nowrap;
  margin-bottom: 0.5rem;
}
#ui-bl {
  bottom: clamp(1rem,3vw,2rem); left: clamp(1rem,3vw,3rem);
  font-size: clamp(0.65rem,1.2vw,1rem);
  color: var(--sub);
}
#ui-br {
  bottom: clamp(1rem,3vw,2rem); right: clamp(1rem,3vw,3rem);
}
#ui-br img {
  width: clamp(60px, 7vw, 110px);
  opacity: 0.85;
  display: block;
}

/* ── 진행바 ── */
#progress {
  position: fixed; top: 0; left: 0;
  height: 3px; background: var(--accent);
  transition: width 0.3s; z-index: 50;
}

/* ── 메인 콘텐츠 ── */
#main {
  position: fixed;
  top: 0; bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: min(92vw, 1400px);
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: clamp(1rem, 3vh, 2.5rem);
  padding: clamp(60px,10vh,100px) clamp(1rem,4vw,3rem) clamp(80px,12vh,120px);
}

/* ── baseline 모드: CSS Grid 정렬 ── */
.bl-wrap { position:relative; width:100%; }
.bl-line {
  position:absolute; left:0; right:0; height:1.5px;
  background:rgba(29,73,255,0.3); pointer-events:none; z-index:0;
}
.bl-grid {
  display:grid;
  grid-template-columns:repeat(var(--items,5), 1fr);
  direction:rtl;
  width:100%;
  column-gap:clamp(6px,3vw,28px);
  row-gap:clamp(28px,3vw,48px);
}
.bl-letter {
  text-align:center;
  font-family:'Noto Sans Arabic',serif;
  font-size:clamp(3rem,calc(56vw/var(--items,4)),9rem);
  font-weight:700; line-height:1; color:var(--text);
}
.bl-label {
  text-align:center;
  font-size:clamp(0.6rem,1.2vw,1rem); font-weight:500;
  color:var(--sub); letter-spacing:0.3px;
}

/* ── 아랍어 ── */
.arabic {
  font-family: 'Noto Sans Arabic', serif;
  font-size: clamp(3rem, 9vw, 9rem);
  font-weight: 700;
  direction: rtl;
  line-height: 1.6;
  text-align: center;
}
/* A/G 유닛: 문장형이라 폰트 살짝 축소 */
.arabic.arabic-sentence {
  font-size: clamp(2rem, 6vw, 6rem);
}

/* ── 한국어/노트 ── */
.korean {
  display: block;
  font-size: clamp(1.2rem, 3.5vw, 3.5rem);
  transition: opacity 0.3s;
  line-height: 1.4;
}
.note {
  display: block;
  font-size: clamp(0.9rem, 2.2vw, 2.2rem);
  color: var(--sub);
  transition: opacity 0.3s;
  line-height: 1.4;
  margin-top: 0.4em;
}
/* ── writing 타입 ── */
.arabic-writing {
  font-family: 'Dongol', 'Noto Kufi Arabic', 'Noto Sans Arabic', serif !important;
  font-weight: normal;
  letter-spacing: 0.05em;
}
/* ── 나스 korean 힌트 ── */
.nass-korean-hint {
  font-size: clamp(0.65rem, 1.2vw, 0.9rem);
  color: var(--sub);
  opacity: 0.85;
  text-align: center;
  margin-top: 0.5rem;
}
#text-area { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; min-height: 2rem; }

/* ── 하이라이트 ── */
.highlight-box {
  border: 3px solid var(--accent);
  background: rgba(29,73,255,0.08);
  border-radius: 14px;
  padding: 0.3em 0.45em 0.25em;
  margin: 0 0.2em;
  display: inline-block;
  vertical-align: middle;
  min-width: 1.4em;
  text-align: center;
  line-height: 1.3;
}
.highlight-text { color: var(--accent); font-weight: bold; }

/* ── 나스 슬라이드 ── */
.nass-prompt {
  display: flex; flex-direction: column;
  align-items: center; gap: 0.8rem;
  min-height: 4rem;
}
.nass-sual {
  font-family: 'Noto Kufi Arabic', 'Noto Sans Arabic', serif;
  font-size: clamp(1.1rem, 2.5vw, 2.2rem);
  font-weight: 400;
  color: var(--sub);
  direction: rtl;
  text-align: center;
}
.nass-arabic-wrap {
  max-height: 55vh; overflow-y: auto;
  width: 100%; padding: 0 clamp(1rem,5vw,4rem);
}
.nass-arabic-wrap .arabic {
  font-family: 'Noto Sans Arabic', serif;
  font-size: clamp(1.2rem, 3.2vw, 3.8rem);
  text-align: center;
  direction: rtl;
  line-height: 2;
}
.nass-sual-note {
  font-family: 'Noto Kufi Arabic', 'Noto Sans Arabic', serif;
  font-size: clamp(0.75rem, 1.5vw, 1.3rem);
  color: var(--sub);
  direction: rtl;
  text-align: center;
  margin-top: 0.3em;
  opacity: 0.8;
}
.nass-note {
  font-size: clamp(0.65rem, 0.9vw, 0.82rem);
  color: var(--sub);
  text-align: center;
  line-height: 1.6;
  opacity: 0.85;
}

/* ── 사이드바 ── */
#sidebar {
  position: fixed; top: 0; left: 0;
  width: min(440px, 92vw); height: 100%;
  background: rgba(245,247,252,0.98);
  border-right: 2px solid var(--accent);
  transform: translateX(-100%);
  transition: transform 0.3s ease;
  z-index: 200;
  display: flex; flex-direction: column;
  box-shadow: 5px 0 30px rgba(29,73,255,0.12);
}
#sidebar.open { transform: translateX(0); }
.sb-head {
  padding: 1.2rem 1.8rem 1rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sb-head h2 {
  color: var(--accent);
  font-size: clamp(0.85rem,1.6vw,1.1rem);
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 0.9rem;
}
/* 단축키 목록 */
.key-list { list-style: none; }
.key-row {
  display: flex; align-items: center; gap: 10px;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
  font-size: clamp(0.62rem,1.1vw,0.8rem);
  color: var(--sub);
}
.key-row:last-child { border-bottom: none; }
.key-row .key-desc { flex: 1; }
.key-row .key-icon { font-size: 1em; opacity: 0.7; width: 1.2em; text-align: center; flex-shrink: 0; }
.key {
  display: inline-flex; align-items: center; justify-content: center;
  background: #fff; border: 1.5px solid var(--border);
  padding: 1px 7px; border-radius: 5px;
  font-weight: 700; color: var(--text);
  font-size: 0.85em; white-space: nowrap;
  box-shadow: 0 1px 3px rgba(29,73,255,0.08);
  min-width: 1.8em;
}

#index-list {
  list-style: none; overflow-y: auto; flex: 1; padding: 0.4rem 0;
}
.idx-item {
  padding: 0.6rem 1.6rem;
  font-size: clamp(0.72rem,1.5vw,1rem);
  color: var(--sub); cursor: pointer;
  border-left: 4px solid transparent;
  transition: all 0.15s;
  display: flex; gap: 0.7rem; align-items: center;
}
.idx-info { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
.idx-item:hover { background: rgba(29,73,255,0.06); color: var(--text); }
.idx-item.active { background: rgba(29,73,255,0.1); color: var(--text); border-left-color: var(--accent); }
.idx-tag {
  font-size: 0.7em; color: var(--accent);
  background: rgba(29,73,255,0.1);
  padding: 1px 6px; border-radius: 4px;
  flex-shrink: 0; text-transform: uppercase;
  font-weight: 700;
}

.idx-ko { font-size: 0.78em; color: var(--sub); display: block; margin-top: 1px; direction: ltr; text-align: left; }
.idx-ar { font-family: 'Noto Sans Arabic', serif; direction: rtl; text-align: left; }


/* ── 섹션 탭 (메인 화면 상단) ── */
#section-tabs {
  display: flex; gap: 0.4rem; flex-wrap: nowrap; align-items: center; margin-top: 0;
}
.sec-tab {
  background: #fff; border: 1.5px solid var(--border); border-radius: 6px;
  color: var(--sub); cursor: pointer; font-family: inherit;
  font-size: clamp(0.5rem, 0.85vw, 0.68rem); line-height: 1.3;
  padding: 2px 9px; text-align: center; transition: all 0.15s; white-space: nowrap;
}
.sec-tab small { display: block; font-size: 0.85em; opacity: 0.7; }
.sec-tab:hover { border-color: var(--accent); color: var(--accent); }
.sec-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: bold; }
.sec-tab.disabled { opacity: 0.25; cursor: default; pointer-events: none; }

/* ── 하단 단축키 바 ── */
#toolbar {
  position: fixed;
  bottom: clamp(0.8rem,2vw,1.5rem);
  left: 50%; transform: translateX(-50%);
  display: flex; gap: clamp(0.7rem,1.8vw,1.5rem);
  z-index: 30; align-items: center;
  background: rgba(255,255,255,0.85);
  border: 1px solid var(--border);
  border-radius: 30px;
  padding: 5px 18px;
  backdrop-filter: blur(8px);
  box-shadow: 0 2px 12px rgba(29,73,255,0.08);
}
.tb-btn {
  background: transparent; border: none;
  color: var(--sub); cursor: pointer;
  font-size: clamp(0.55rem,0.82vw,0.72rem);
  font-family: inherit;
  display: flex; align-items: center; gap: 4px;
  opacity: 0.7; transition: opacity 0.15s, color 0.15s;
  padding: 2px 0;
  white-space: nowrap;
}
.tb-btn:hover { opacity: 1; color: var(--accent); }
.tb-btn.active { opacity: 1; color: var(--accent); }
.tb-btn .kb {
  display: inline-flex; align-items: center; justify-content: center;
  background: #fff; border: 1.5px solid var(--border);
  border-radius: 4px; padding: 0px 5px;
  font-size: 0.88em; color: var(--text); font-weight: 700;
  min-width: 1.6em;
  box-shadow: 0 1px 2px rgba(29,73,255,0.07);
}
#btn-nass { display: none; }

/* ── 로딩 ── */
#loading {
  position: fixed; inset: 0;
  background: var(--accent);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 1.4rem;
  z-index: 999;
}
#loading img {
  width: clamp(80px, 12vw, 140px);
  filter: brightness(0) invert(1);
}
#loading .loading-label {
  font-size: clamp(0.7rem, 1.2vw, 0.95rem);
  color: rgba(255,255,255,0.75);
  letter-spacing: 2.5px;
  text-transform: lowercase;
  font-weight: 400;
}

/* ── 시작 오버레이 ── */
#start-overlay {
  position: fixed; inset: 0;
  background: rgba(235,238,248,0.95);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 998; cursor: pointer;
  gap: 1.2rem;
}
#start-overlay .start-logo {
  width: clamp(80px, 10vw, 140px);
  margin-bottom: 0.5rem;
}
#start-overlay .start-text {
  font-size: clamp(0.9rem, 2vw, 1.3rem);
  color: var(--sub);
  letter-spacing: 1px;
}
#start-overlay .start-btn {
  margin-top: 0.5rem;
  padding: 0.6em 2em;
  border: 1.5px solid var(--accent);
  border-radius: 30px;
  background: transparent;
  color: var(--accent);
  font-size: clamp(0.9rem, 1.8vw, 1.2rem);
  font-family: inherit;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
#start-overlay .start-btn:hover {
  background: var(--accent); color: #fff;
}
</style>

    <ul class="key-list">
      <li class="key-row"><span class="key">M</span><span class="key-desc">메뉴 열기/닫기</span></li>
      <li class="key-row"><span class="key">Space</span><span class="key-desc">해석 보기/가리기</span></li>

<script>
// ── 설정 ──────────────────────────────────────────────
const SHEET_ID   = '1w7e0mLLgFhzU7Ixs6CUfzgrwUG6EEy8jHijXF5UJwY8';
const AUDIO_BASE = 'https://storage.googleapis.com/all-that-arabic-14';
const AUDIO_FOLDER = 'listening144';

// 시트 탭명
const TAB_UNIT    = 'unit';
const TAB_PATTERN = 'pattern';
const TAB_DRILL   = 'drill';
const TAB_KALIMAT = 'kalimat/exp';
const TAB_NASS    = 'nass';

const TYPE_EN = { unit:'UNIT', ptn:'PATTERN', drilla:'DRILL A', drillb:'DRILL B', writing:'WRITING', exp:'EXPRESSION', kalimat:'KALIMAT', nass:'NASS' };
const TYPE_KO = { unit:'유닛',  ptn:'패턴',   drilla:'드릴A',   drillb:'드릴B',   writing:'쓰기',    exp:'표현',        kalimat:'단어',      nass:'지문' };

// ── 상태 ──────────────────────────────────────────────
let slides = [], current = 0;
let meaningVisible = true;
let arabicVisible = true;
let nassTextVisible = false;
let sidebarOpen = false;
let _firstLoad = true;
let audioPlaying = false;
let currentPg = null;

// ── 유틸 ──────────────────────────────────────────────
function normalizeType(t) {
  if (!t) return '';
  const tl = t.toLowerCase().trim();
  if (tl === 'unit')    return 'unit';
  if (tl === 'ptn')     return 'ptn';
  if (tl === 'drilla')  return 'drilla';
  if (tl === 'drillb')  return 'drillb';
  if (tl === 'writing') return 'writing';
  if (tl === 'exp')     return 'exp';
  if (tl === 'kalimat') return 'kalimat';
  if (tl === 'nass')    return 'nass';
  return tl;
}

function getRowU(r) { return r.u || ''; }

function getRowId(r) {
  return r.id_unit || r['id_ptn(no)'] || r.id_ptn || r.id_drill || r.id_kalimat || r.id_nass || '';
}

// ── JSONP 데이터 로더 ──────────────────────────────────
const _cache = {};
// name: 시트명 또는 캐시 키. gid가 있으면 gid로 fetch, 없으면 sheet명으로 fetch
function fetchSheetData(name, gid = null) {
  const cacheKey = gid ? ('gid:' + gid) : name;
  if (_cache[cacheKey]) return Promise.resolve(_cache[cacheKey]);
  return new Promise((resolve, reject) => {
    const cb = '__gviz_' + cacheKey.replace(/\W/g,'') + '_' + Date.now();
    const timer = setTimeout(() => { delete window[cb]; reject(new Error('Timeout: '+cacheKey)); }, 15000);
    window[cb] = resp => {
      clearTimeout(timer);
      delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
      try {
        if (!resp?.table) throw new Error('No data: '+cacheKey);
        const cols = resp.table.cols;
        const headers = cols.map(c => (c.label||'').toLowerCase().trim());
        const rows = (resp.table.rows||[]).map(row => {
          const obj = {};
          headers.forEach((h,i) => {
            if (!h) return;
            const cell = row.c?.[i];
            const _val = (cell && cell.v != null)
              ? (cell.f != null && (
                   (typeof cell.v === 'string' && cell.v.startsWith('Date(')) ||
                   typeof cell.v === 'number'
                 ) ? cell.f : cell.v)
              : null;
            obj[h] = _val != null ? String(_val).trim() : '';
          });
          return obj;
        }).filter(r => Object.values(r).some(v => v !== ''));
        _cache[cacheKey] = rows;
        resolve(rows);
      } catch(e) { reject(e); }
    };
    const script = document.createElement('script');
    const param = gid ? `gid=${gid}` : `sheet=${encodeURIComponent(name)}`;
    script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${cb}&${param}&headers=1`;
    script.onerror = () => { clearTimeout(timer); delete window[cb]; reject(new Error('Fail: '+cacheKey)); };
    document.head.appendChild(script);
  });
}

// ── parseText ──────────────────────────────────────────
function parseText(str) {
  if (!str) return '';
  return str
    .replace(/<br\s*\/?>/gi, '<br>')
    .replace(/\n|\r\n|\r/g, '<br>')
    .replace(/_([^_\n]+)_/g, '<span class="highlight-box">$1</span>')
    .replace(/\*([^*\n]+)\*/g, '<span class="highlight-text">$1</span>');
}

// ── buildSlides ────────────────────────────────────────
async function buildSlides(baseUnit) {
  slides = [];
  nassTextVisible = false;
  currentPg = baseUnit;
  const _usp = new URLSearchParams(location.search);
  _usp.set('unit', baseUnit);
  history.replaceState(null, '', '?' + _usp.toString());

  const [unitRaw, patternRaw, drillRaw, kalimatRaw, nassRaw] = await Promise.all([
    fetchSheetData(TAB_UNIT),
    fetchSheetData(TAB_PATTERN),
    fetchSheetData(TAB_DRILL),
    fetchSheetData(TAB_KALIMAT),
    fetchSheetData(TAB_NASS),
  ]);

  const ok  = r => (r.status || '').toLowerCase() === 'confirmed';
  const inU = r => (r.u || '') === baseUnit;
  const push = (type, r) => slides.push({ type, data: r, pg: baseUnit });

  // 1. 유닛 슬라이드
  unitRaw.filter(r => inU(r) && ok(r)).forEach(r => push('unit', r));

  // 2. 패턴별: 패턴 → drillA + writing
  patternRaw.filter(r => inU(r) && ok(r)).forEach(ptn => {
    push('ptn', ptn);
    const ref = ptn['id_ptn(no)'] || '';
    drillRaw
      .filter(r => inU(r) && ok(r) && r.ref_ptn === ref &&
        (normalizeType(r.type) === 'drilla' || normalizeType(r.type) === 'writing'))
      .forEach(r => push(normalizeType(r.type), r));
  });

  // 3. drillB (연습)
  drillRaw.filter(r => inU(r) && ok(r) && normalizeType(r.type) === 'drillb')
    .forEach(r => push('drillb', r));

  // 4. exp (표현)
  kalimatRaw.filter(r => inU(r) && ok(r) && normalizeType(r.type) === 'exp')
    .forEach(r => push('exp', r));

  // 5. nass (지문)
  nassRaw.filter(r => inU(r) && ok(r)).forEach(r => push('nass', r));

  // 6. kalimat (단어)
  kalimatRaw.filter(r => inU(r) && ok(r) && normalizeType(r.type) === 'kalimat')
    .forEach(r => push('kalimat', r));

  if (_firstLoad) {
    const savedSlide = parseInt(new URLSearchParams(location.search).get('slide')) || 0;
    current = Math.max(0, Math.min(slides.length - 1, savedSlide));
    _firstLoad = false;
  } else {
    current = 0;
  }

  buildIndex();
  renderSlide();
}

// ── renderSlide ────────────────────────────────────────
function renderSlide() {
  if (!slides.length) return;
  const s = slides[current];

  // 진행바
  document.getElementById('progress').style.width = ((current+1)/slides.length*100)+'%';

  // 중앙 타입 레이블 업데이트
  const typeLabel = TYPE_EN[s.type] || s.type.toUpperCase();
  const nassNum = s.type === 'nass' ? (() => { const m = getRowId(s.data).match(/(\d+)$/); return m ? ' · nass-' + m[1] : ''; })() : '';
  document.getElementById('ui-tr').textContent = typeLabel + nassNum;

  // 상단 좌측: 현재 유닛 정보(unit탭) + 섹션 탭
  const tl = document.getElementById('ui-tl');
  const curPgU = s.pg || '';
  const unitRow = (_cache[TAB_UNIT] || []).find(r => r.u === curPgU);
  const tlArabic = (unitRow?.arabic || '').substring(0, 30);
  const tlKorean = (unitRow?.korean || '').substring(0, 28);
  tl.innerHTML =
    `<div style="display:flex;align-items:center;gap:1.4rem;">` +
      `<div>` +
        `<div style="font-size:clamp(0.45rem,0.7vw,0.6rem);text-transform:uppercase;letter-spacing:2px;color:var(--sub);opacity:0.6;margin-bottom:0.2rem;">${curPgU}</div>` +
        `<div style="font-family:'Noto Sans Arabic',serif;direction:rtl;font-size:clamp(0.9rem,1.8vw,1.4rem);font-weight:700;line-height:1.3;">${tlArabic}</div>` +
        `<div style="font-size:clamp(0.6rem,1vw,0.85rem);color:var(--sub);font-weight:400;">${tlKorean}</div>` +
      `</div>` +
      `<div id="section-tabs"></div>` +
    `</div>`;
  buildSectionTabs();

  // 나스 지문 버튼: 나스 슬라이드에서만 표시
  document.getElementById('btn-nass').style.display = s.type === 'nass' ? 'flex' : 'none';
  // 오디오 버튼: 패턴 슬라이드에서는 숨김
  document.getElementById('btn-audio').style.display = s.type === 'pattern' ? 'none' : '';

  // ── 나스 슬라이드 ──
  if (s.type === 'nass') {
    renderNass(s); updateIndex(); return;
  }

  // ── 일반 슬라이드 (pattern / repertory / drill / exp / writing) ──
  const d = s.data;
  const cssMode = (d.css||'').trim();

  if (cssMode === 'baseline') {
    renderBaseline(s);
    updateIndex(); return;
  }

  const isWriting = s.type === 'writing';
  const isSentence = /^[AG]/i.test(s.pg || '');
  const arOp = arabicVisible ? '1' : '0';
  document.getElementById('arabic-area').innerHTML =
    `<div class="arabic${isWriting ? ' arabic-writing' : ''}${isSentence ? ' arabic-sentence' : ''}" style="opacity:${arOp};transition:opacity 0.3s;">${parseText(d.arabic || '')}</div>`;

  const op = meaningVisible ? '1' : '0';
  const noteText = d.note || d.transliteration || '';
  document.getElementById('text-area').innerHTML = `
    <div class="korean" style="opacity:${op}">${parseText(d.korean || '')}</div>
    ${noteText ? `<div class="note" style="opacity:${op}">${parseText(noteText)}</div>` : ''}
  `;

  updateIndex();
}

function renderBaseline(s) {
  const d = s.data;
  const tokens = (d.arabic||'').trim().split(/\s+/).filter(t => t && t !== '|');
  const labelSrc = (d.korean||'').trim() || (d.note||'').trim();
  const labels = labelSrc
    ? labelSrc.split(/\s+/).filter(t => t !== '|').map(l => l.replace(/_/g,' '))
    : [];
  const arOp = arabicVisible ? '1' : '0';

  const arabicArea = document.getElementById('arabic-area');
  arabicArea.innerHTML = '';
  arabicArea.style.cssText = `opacity:${arOp};transition:opacity 0.3s;`;

  const wrap = document.createElement('div');
  wrap.className = 'bl-wrap';

  const line = document.createElement('div');
  line.className = 'bl-line';
  wrap.appendChild(line);

  const grid = document.createElement('div');
  grid.className = 'bl-grid';
  grid.style.setProperty('--items', tokens.length || 4);

  // 행 1: 아랍어 글자
  let firstLetter = null;
  tokens.forEach(ch => {
    const letter = document.createElement('span');
    letter.className = 'bl-letter';
    letter.innerHTML = parseText(ch);
    grid.appendChild(letter);
    if (!firstLetter) firstLetter = letter;
  });

  // 행 2: 라벨
  tokens.forEach((ch, i) => {
    const lbl = document.createElement('span');
    lbl.className = 'bl-label';
    lbl.innerHTML = labels[i] ? parseText(labels[i]) : ' ';
    grid.appendChild(lbl);
  });

  wrap.appendChild(grid);
  arabicArea.appendChild(wrap);

  // 오버플로 축소 + baseline 선 위치
  requestAnimationFrame(() => {
    if (!grid.isConnected) return;
    const avail = (arabicArea.clientWidth ?? 0) - 48;
    const actual = grid.scrollWidth;
    if (actual > avail && avail > 0) {
      const sc = Math.max(0.65, avail / actual);
      grid.style.transform = `scale(${sc.toFixed(4)})`;
      grid.style.transformOrigin = 'center top';
    }
    requestAnimationFrame(() => {
      if (!grid.isConnected || !firstLetter) return;
      const probe = document.createElement('span');
      probe.style.cssText = 'display:inline-block;width:0;height:0;vertical-align:baseline;overflow:hidden;';
      firstLetter.appendChild(probe);
      const wrapRect  = wrap.getBoundingClientRect();
      const probeRect = probe.getBoundingClientRect();
      probe.remove();
      if (wrapRect.height > 0)
        line.style.top = (probeRect.bottom - wrapRect.top) + 'px';
    });
  });

  document.getElementById('text-area').innerHTML = '';
}

function renderNass(s) {
  const d = s.data;
  const sual = d.sual || '';
  // sual 없으면 arabic 바로 표시, 있으면 T로 토글
  const showArabic = nassTextVisible || !sual;

  const nassTextHtml = `
    <div class="nass-arabic-wrap">
      <div class="arabic" dir="rtl">${parseText(d.arabic || '')}</div>
    </div>`;

  const promptHtml = `<div class="nass-prompt"></div>`;

  document.getElementById('arabic-area').innerHTML =
    showArabic ? (nassTextHtml + promptHtml) : promptHtml;

  const op = meaningVisible ? '1' : '0';
  document.getElementById('text-area').innerHTML = `
    ${d.korean ? `<div class="nass-korean-hint" style="opacity:${op}">${parseText(d.korean)}</div>` : ''}
    ${d.note ? `<div class="nass-note" style="opacity:${op}">${parseText(d.note)}</div>` : ''}
    ${sual ? `<div class="nass-sual-note">${parseText(sual)}</div>` : ''}
  `;
}

// ── 의미 토글 — 래퍼토리는 무시 ─────────────────────────
function toggleMeaning() {
  if (slides[current]?.type === 'repertory') return;
  meaningVisible = !meaningVisible;
  document.getElementById('btn-meaning').classList.toggle('active', !meaningVisible);
  const s = slides[current];
  if (!s) return;
  const op = meaningVisible ? '1' : '0';
  if (s.type === 'nass') {
    renderNass(s);
  } else {
    document.querySelectorAll('#text-area .korean, #text-area .note').forEach(el => {
      el.style.opacity = op;
    });
  }
}

// ── 본문(아랍어) 토글 ──────────────────────────────────
function toggleArabic() {
  arabicVisible = !arabicVisible;
  document.getElementById('btn-arabic').classList.toggle('active', !arabicVisible);
  const el = document.querySelector('#arabic-area .arabic');
  if (el) el.style.opacity = arabicVisible ? '1' : '0';
}

// ── 나스 지문 토글 ─────────────────────────────────────
function toggleNass() {
  nassTextVisible = !nassTextVisible;
  document.getElementById('btn-nass').classList.toggle('active', nassTextVisible);
  const s = slides[current];
  if (s?.type === 'nass') renderNass(s);
}

// ── 사이드바 ──────────────────────────────────────────
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('open', sidebarOpen);
  document.getElementById('btn-menu').classList.toggle('active', sidebarOpen);
}


// ── 섹션 탭 ────────────────────────────────────────────
const SEC_FIXED = [
  { key:'drillb',  ko:'연습', en:'Drill B'    },
  { key:'exp',     ko:'표현', en:'Expression' },
  { key:'nass',    ko:'지문', en:'Nass'       },
  { key:'kalimat', ko:'단어', en:'Kalimat'    },
];
function buildSectionTabs() {
  const container = document.getElementById('section-tabs');
  if (!container) return;
  container.innerHTML = '';
  const curPg = slides[current]?.pg;

  // 패턴별 동적 탭 — 두 줄: "패턴" + 한국어 이름
  slides.forEach((s, idx) => {
    if (s.pg !== curPg || s.type !== 'ptn') return;
    const ko = (s.data.korean || '').substring(0, 18);
    const btn = document.createElement('button');
    btn.className = 'sec-tab';
    btn.dataset.key = 'ptn_' + idx;
    btn.onclick = () => goTo(idx);
    btn.innerHTML = `패턴<small>${ko}</small>`;
    container.appendChild(btn);
  });

  // 고정 탭 (연습/표현/지문/단어)
  SEC_FIXED.forEach(sec => {
    const firstIdx = slides.findIndex(s => s.pg === curPg && s.type === sec.key);
    const btn = document.createElement('button');
    btn.className = 'sec-tab' + (firstIdx === -1 ? ' disabled' : '');
    btn.dataset.key = sec.key;
    if (firstIdx !== -1) btn.onclick = () => goTo(firstIdx);
    btn.innerHTML = `${sec.ko}<small>${sec.en}</small>`;
    container.appendChild(btn);
  });

  updateSectionTabs();
}

function updateSectionTabs() {
  const container = document.getElementById('section-tabs');
  if (!container) return;
  const curType = slides[current]?.type;

  // 패턴 하위 슬라이드(ptn/drilla/writing)이면 가장 가까운 이전 ptn 탭 활성화
  let activePtnKey = null;
  if (curType === 'ptn' || curType === 'drilla' || curType === 'writing') {
    for (let i = current; i >= 0; i--) {
      if (slides[i]?.type === 'ptn') { activePtnKey = 'ptn_' + i; break; }
    }
  }

  container.querySelectorAll('.sec-tab').forEach(btn => {
    const k = btn.dataset.key;
    let isActive = false;
    if (activePtnKey && k === activePtnKey) isActive = true;
    else if (!activePtnKey && k === curType) isActive = true;
    btn.classList.toggle('active', isActive);
  });
}
// ── 인덱스 빌드 ───────────────────────────────────────
function buildIndex() {
  const list = document.getElementById('index-list');
  list.innerHTML = '';

  const unitRaw = _cache[TAB_UNIT] || [];
  unitRaw
    .filter(r => (r.status || '').toLowerCase() === 'confirmed')
    .forEach(r => {
      const u  = r.u || '';
      const ar = (r.arabic  || '').substring(0, 28);
      const ko = (r.korean  || '').substring(0, 26);
      const li = document.createElement('li');
      li.className = 'idx-item';
      li.dataset.u = u;
      li.innerHTML =
        `<span class="idx-tag">${u}</span>` +
        `<span class="idx-info">` +
          `<span class="idx-ar">${ar}</span>` +
          `<span class="idx-ko">${ko}</span>` +
        `</span>`;
      list.appendChild(li);
    });
}

function updateIndex() {
  const curU = slides[current]?.data?.u || '';
  document.querySelectorAll('.idx-item').forEach(el => {
    el.classList.toggle('active', el.dataset.u === curU);
  });
  const active = document.querySelector('.idx-item.active');
  if (active) active.scrollIntoView({ block:'nearest', behavior:'smooth' });
}

// buildUnitButtons 제거 — 내비게이터로 대체

// ── 오디오 URL ─────────────────────────────────────────
// datasheet url 컬럼 우선, 없으면 GCS listening/ 경로 (mp3 → wav 순으로 시도)
function getAudioUrls(s) {
  if (!s) return [];
  const d = s.data;
  const id = getRowId(d);
  if (d?.url) return [d.url.trim()];
  if (!id) return [];
  const base = `${AUDIO_BASE}/${AUDIO_FOLDER}/${encodeURIComponent(id.normalize('NFD')).replace(/%2C/gi,',')}`;
  return [base + '.mp3', base + '.wav'];
}

function toggleAudio() {
  const audio = document.getElementById('slide-audio');
  const s = slides[current];
  const urls = getAudioUrls(s);
  const btn = document.getElementById('btn-audio');
  if (audioPlaying) {
    audio.pause(); audio.currentTime = 0;
    audioPlaying = false;
    btn.classList.remove('active');
  } else if (urls.length) {
    const onEnd = () => { audioPlaying = false; btn.classList.remove('active'); };
    // onerror와 play().catch가 동시에 발화할 수 있으므로 guard flag 사용
    const tryPlay = (i) => {
      if (i >= urls.length) { onEnd(); return; }
      let fired = false;
      const advance = () => { if (!fired) { fired = true; tryPlay(i + 1); } };
      audio.onended = onEnd;
      audio.onerror = advance;
      audio.src = urls[i];
      audio.load();
      audio.play().catch(advance);
    };
    tryPlay(0);
    audioPlaying = true;
    btn.classList.add('active');
  }
}

// ── 내비게이션 ────────────────────────────────────────
function goTo(n) {
  if (!slides.length) return;
  const audio = document.getElementById('slide-audio');
  if (audioPlaying) {
    audio.pause(); audio.currentTime = 0; audioPlaying = false;
    document.getElementById('btn-audio').classList.remove('active');
  }
  current = Math.max(0, Math.min(slides.length - 1, n));
  const _sp = new URLSearchParams(location.search);
  _sp.set('slide', current);
  history.replaceState(null, '', '?' + _sp.toString());
  nassTextVisible = false;
  renderSlide();
}

// ── 키보드 ────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  switch(e.key) {
    case 'ArrowRight': case 'ArrowDown': e.preventDefault(); goTo(current+1); break;
    case 'ArrowLeft':  case 'ArrowUp':   e.preventDefault(); goTo(current-1); break;
    case ' ':          e.preventDefault(); toggleMeaning(); break;
    case 'a': case 'A': toggleArabic(); break;
    case 'm': case 'M': toggleSidebar(); break;
    case 't': case 'T': if (slides[current]?.type === 'nass') toggleNass(); break;
    case 's': case 'S': toggleAudio(); break;
    case 'Escape': if (sidebarOpen) toggleSidebar(); break;
    case 'End':  e.preventDefault(); goTo(slides.length - 1); break;
    case 'Home': e.preventDefault(); goTo(0); break;
  }
});

// ── 버튼 이벤트 ───────────────────────────────────────
document.getElementById('btn-menu').onclick    = toggleSidebar;
document.getElementById('btn-audio').onclick   = toggleAudio;
document.getElementById('btn-meaning').onclick = toggleMeaning;
document.getElementById('btn-arabic').onclick  = toggleArabic;
document.getElementById('btn-nass').onclick    = toggleNass;

// ── 초기화 ────────────────────────────────────────────
// 내비게이터 클릭 — 이벤트 위임
document.addEventListener('click', function(e) {
  const item = e.target.closest('#index-list .idx-item');
  if (!item || !item.dataset.u) return;
  buildSlides(item.dataset.u).catch(err => console.error(err));
  if (sidebarOpen) toggleSidebar();
});

async function init() {
  try {
    // 모든 탭 병렬 캐싱
    await Promise.all([
      fetchSheetData(TAB_UNIT),
      fetchSheetData(TAB_PATTERN),
      fetchSheetData(TAB_DRILL),
      fetchSheetData(TAB_KALIMAT),
      fetchSheetData(TAB_NASS),
    ]);
    // 첫 시작 유닛: unit탭 기준
    const unitRaw = _cache[TAB_UNIT] || [];
    const baseUnits = unitRaw
      .filter(r => (r.status || '').toLowerCase() === 'confirmed')
      .map(r => r.u || '')
      .filter(Boolean);

    const savedPg = new URLSearchParams(location.search).get('unit');
    const startPg = (savedPg && baseUnits.includes(savedPg)) ? savedPg : (baseUnits[0] || 'A01');
    await buildSlides(startPg);
  } catch(e) {
    document.getElementById('loading').textContent = '로딩 실패: ' + e.message;
    console.error(e); return;
  }
  document.getElementById('loading').style.display = 'none';
}

init();
</script>
